<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ai calculator</title>
<link rel="stylesheet" href="style.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
</head>

<body>

<div id="app">

<h1>ai calculator</h1>

<div class="menu">
<button onclick="setMode('math')">Math</button>
<button onclick="setMode('3d')">3D</button>
<button onclick="setMode('atoms')">Atoms</button>
<button onclick="setMode('puzzle')">Puzzle</button>
</div>

<input id="input" placeholder="Enter calculation">

<div id="controls"></div>
<div id="canvas"></div>

<button onclick="calculate()">Calculate</button>

<p id="result"></p>
<p id="xp">XP: 0 | Level: 1</p>

</div>

<script src="script.js"></script>
</body>
</html>
