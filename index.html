<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ultimate Calculator</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div id="startScreen">
  <h1>🚀 Ultimate AI Calculator</h1>
  <p>
  Welcome! This calculator supports Math, Physics, 3D Models, Atom Simulation, and Puzzle System.<br>
  Solve problems, gain XP, and explore interactive science tools.
  </p>
  <p class="credit">
  Made by Ali Saif Ali Mustafa Ahmed Shaheed Amir Ghaith Shawqi  
  </p>
  <button onclick="startApp()">START</button>
</div>

<div id="app">

<div class="topBtns">
  <button onclick="setMode('math')">Math</button>
  <button onclick="setMode('physics')">Physics</button>
  <button onclick="setMode('3d')">3D</button>
  <button onclick="setMode('atoms')">Atoms</button>
  <button onclick="setMode('puzzle')">Puzzle</button>
</div>

<input id="input" placeholder="Enter values...">

<div id="buttons"></div>
<div id="canvasBox"></div>

<button onclick="calculate()">Calculate</button>

<p id="result"></p>
<p id="xp">XP: 0 | Level: 1</p>

</div>

<script src="script.js"></script>
</body>
</html>
